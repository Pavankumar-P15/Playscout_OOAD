spring.application.name=backend
server.port=${PORT:8080}

spring.config.import=optional:file:.env[.properties]

# Supabase Postgres 
spring.datasource.url=${DB_URL:jdbc:postgresql://YOUR_SUPABASE_HOST:5432/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DB_USER:YOUR_SUPABASE_DB_USER}
spring.datasource.password=${DB_PASSWORD:YOUR_SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Connection pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_TIMEOUT:30000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Auth
jwt.secret=${JWT_SECRET}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.oauth.enabled=${OAUTH_ENABLED:false}
