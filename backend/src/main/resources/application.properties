spring.application.name=backend
server.port=${PORT:8080}

spring.config.import=optional:file:.env[.properties]

# Supabase Postgres 
spring.datasource.url=${DB_URL:jdbc:postgresql://YOUR_SUPABASE_HOST:5432/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DB_USER:YOUR_SUPABASE_DB_USER}
spring.datasource.password=${DB_PASSWORD:YOUR_SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Connection pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_TIMEOUT:30000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Auth
jwt.secret=${JWT_SECRET}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.oauth.enabled=${OAUTH_ENABLED:false}

# News API
gnews.api.url=${GNEWS_API_URL:https://gnews.io/api/v4/search}
gnews.cache.ttl-seconds=${GNEWS_CACHE_TTL_SECONDS:300}

# Supabase Storage
supabase.url=${SUPABASE_URL:}
supabase.key=${SUPABASE_KEY:}
supabase.bucket=${SUPABASE_BUCKET:uploads}

# Multipart File Upload
spring.servlet.multipart.max-file-size=${SERVLET_MULTIPART_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${SERVLET_MULTIPART_MAX_REQUEST_SIZE:50MB}
server.tomcat.max-http-post-size=${SERVLET_MULTIPART_MAX_REQUEST_SIZE:52428800}
